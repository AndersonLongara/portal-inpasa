<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 40 40"
  width="40"
  height="40"
  role="img"
  aria-label="AltraHub logo icon"
>
  <!-- Subtle radial connection lines -->
  <line x1="20" y1="20" x2="20" y2="4"  stroke="#6C5CE7" stroke-width="0.75" opacity="0.35"/>
  <line x1="20" y1="20" x2="5"  y2="36" stroke="#6C5CE7" stroke-width="0.75" opacity="0.35"/>
  <line x1="20" y1="20" x2="35" y2="36" stroke="#6C5CE7" stroke-width="0.75" opacity="0.35"/>

  <!-- Triangle vertex nodes -->
  <circle cx="20" cy="4"  r="3.5" fill="#6C5CE7"/>
  <circle cx="5"  cy="36" r="3.5" fill="#6C5CE7"/>
  <circle cx="35" cy="36" r="3.5" fill="#6C5CE7"/>

  <!-- Central hub node -->
  <circle cx="20" cy="20" r="5" fill="#6C5CE7"/>
</svg>
