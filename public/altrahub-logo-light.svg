<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 160 40"
  width="160"
  height="40"
  role="img"
  aria-label="AltraHub"
>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;800&amp;display=swap');
      .logo-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: -0.01em;
        fill: #1B2631;
      }
      .logo-dot {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 800;
        fill: #6C5CE7;
      }
    </style>
  </defs>

  <!-- Icon V16: Purple Radial -->
  <!-- Subtle triangle lines -->
  <line x1="20" y1="20" x2="20" y2="5"  stroke="#6C5CE7" stroke-width="0.7" opacity="0.18"/>
  <line x1="20" y1="20" x2="6"  y2="34" stroke="#6C5CE7" stroke-width="0.7" opacity="0.18"/>
  <line x1="20" y1="20" x2="34" y2="34" stroke="#6C5CE7" stroke-width="0.7" opacity="0.18"/>
  <!-- Vertex nodes -->
  <circle cx="20" cy="5"  r="3.2" fill="#6C5CE7"/>
  <circle cx="6"  cy="34" r="3.2" fill="#6C5CE7"/>
  <circle cx="34" cy="34" r="3.2" fill="#6C5CE7"/>
  <!-- Central hub node -->
  <circle cx="20" cy="20" r="4.5" fill="#6C5CE7"/>

  <!-- Wordmark: altrahub. -->
  <text x="46" y="27" class="logo-text">altrahub<tspan class="logo-dot">.</tspan></text>
</svg>
